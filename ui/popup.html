<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScamDefy</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="popup-body">
    <div class="popup-container">

        <!-- ─── HEADER ──────────────────────────────────────────────── -->
        <div class="popup-header">
            <div class="popup-brand">
                <div class="popup-logo">🛡️</div>
                <div>
                    <div class="popup-brand-name">ScamDefy</div>
                    <div class="popup-brand-tagline">AI-Powered Scam Protection</div>
                </div>
            </div>

            <!-- Current Page Status Card -->
            <div class="status-card" id="statusCard">
                <div class="status-indicator safe" id="statusIndicator">
                    <span id="statusEmoji">✓</span>
                    <span class="pulse-ring" id="pulseRing"></span>
                </div>
                <div class="status-info">
                    <div class="status-label">Current Page</div>
                    <div class="status-value safe" id="statusValue">Scanning...</div>
                    <div class="status-url" id="statusUrl">—</div>
                </div>
                <div id="statusScore" style="
          font-size: 11px;
          font-family: 'JetBrains Mono', monospace;
          color: var(--text-muted);
          text-align: right;
        ">
                    <div style="font-size: 18px; font-weight: 800; color: var(--safe);" id="scoreDisplay">—</div>
                    <div style="font-size: 9px; margin-top: 2px;">RISK SCORE</div>
                </div>
            </div>
        </div>

        <!-- ─── STATS GRID ───────────────────────────────────────────── -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="statBlocked">0</div>
                <div class="stat-label">Blocked Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total Blocked</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statDetected">0</div>
                <div class="stat-label">Detected</div>
            </div>
        </div>

        <!-- ─── RECENT THREATS ───────────────────────────────────────── -->
        <div class="section-header">
            <div class="section-title">
                <span>🕐</span>
                Recent Threats
            </div>
            <button class="section-action" id="btnClearHistory">Clear</button>
        </div>

        <div class="threat-list" id="threatList">
            <!-- Populated by popup.js -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div style="font-size: 12px; color: var(--text-muted);">Loading history...</div>
            </div>
        </div>

        <!-- ─── FOOTER ───────────────────────────────────────────────── -->
        <div class="popup-footer">
            <div class="footer-status">
                <span class="protection-dot" id="protectionDot"></span>
                <span id="protectionLabel">Protection Active</span>
            </div>
            <div class="footer-version">v1.0.0</div>
        </div>

    </div>

    <script src="popup.js"></script>
</body>

</html>
